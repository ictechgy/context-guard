name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-prepublish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run prepublish release gate
        run: python scripts/prepublish_check.py

      - name: Run staged plugin release smoke
        run: python scripts/release_smoke.py

  test-and-prepublish-macos:
    name: test-and-prepublish (macos-latest, 3.12)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run prepublish release gate
        run: python scripts/prepublish_check.py

      - name: Run staged plugin release smoke
        run: python scripts/release_smoke.py
