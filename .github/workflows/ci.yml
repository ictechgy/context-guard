name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-prepublish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run prepublish release gate
        run: python scripts/prepublish_check.py

      - name: Run staged plugin release smoke
        run: python scripts/release_smoke.py

  test-and-prepublish-macos:
    name: test-and-prepublish (macos-latest, 3.12)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Run prepublish release gate
        run: python scripts/prepublish_check.py

      - name: Run staged plugin release smoke
        run: python scripts/release_smoke.py

      - name: Run ContextGuard Mac Swift tests
        timeout-minutes: 15
        working-directory: apps/contextguard-mac
        run: swift test
