name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish docs to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf /tmp/contextguard-pages
          mkdir -p /tmp/contextguard-pages
          cp -R docs/. /tmp/contextguard-pages/
          touch /tmp/contextguard-pages/.nojekyll
          cd /tmp/contextguard-pages
          git init
          git checkout -b gh-pages
          git add .
          git commit -m 'Publish GitHub Pages'
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
