name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Refuse unexpected hidden docs files
        shell: bash
        run: |
          if [ -L docs/.nojekyll ] || [ ! -f docs/.nojekyll ] || [ -s docs/.nojekyll ]; then
            echo "::error::docs/.nojekyll must be an empty regular file"
            exit 1
          fi

          unexpected_hidden="$(find docs -name '.*' ! -path 'docs/.nojekyll' -print)"
          if [ -n "$unexpected_hidden" ]; then
            echo "::error::Unexpected hidden path(s) under docs; only docs/.nojekyll is allowed"
            printf '%s\n' "$unexpected_hidden"
            exit 1
          fi

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
